    \ DirectorStandaloneAgent\n- role_agent_service.py: AgentService - tui_console.py:\
    \ RoleAgentTUI, DirectorRoleAgentTUI - standalone_entry.py: module (frozen CLI\
    \ entry) Unified execution path (mandatory for all production):\n    RoleRuntimeService\
    \ → RoleExecutionKernel (CHAT | WORKFLOW mode)\nPath audit: RoleRuntimeService.execute_role_task(),\
