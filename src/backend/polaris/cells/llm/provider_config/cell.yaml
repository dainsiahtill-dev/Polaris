id: llm.provider_config
title: LLM Provider Config
kind: capability
visibility: public
stateful: false
owner: llm
purpose: 'Resolve provider request/test contexts and synchronize process settings
  from canonical LLM config with explicit contract boundaries.

  '
current_modules:
- polaris.cells.llm.provider_config.public.service
- polaris.cells.llm.provider_config.internal.provider_context
- polaris.cells.llm.provider_config.internal.test_context
- polaris.cells.llm.provider_config.internal.settings_sync
tags: []
owned_paths:
- polaris/cells/llm/provider_config/**
public_contracts:
