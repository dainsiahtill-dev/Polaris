# Long Session Evaluation Suite Template
# Version: 1
# Purpose: Replay/long-session evaluation for Attention Runtime (A1-A5)
# Encoding: UTF-8
#
# Case Structure:
#   case_id: str
#   conversation: list of {role, content}
#   expected_latest_intent: str
#   expected_pending_followup_status: str  # "", "pending", "confirmed", "denied", "paused", "redirected"
#   expected_attention_roots_count: int
#   expect_seal_blocked: bool

version: 1
suite_id: "long_session_eval_v1"
description: >
  Long session evaluation suite for Attention Runtime improvements (A1-A5).
  Covers short/medium/long sessions, multi-topic switching, pending follow-up
  lifecycle, and attention focus regression scenarios.

cases:

  # =========================================================================
  # Category 1: Short Sessions (3-5 turns)
  # =========================================================================

  - case_id: "short_session_001"
    description: "Simple greeting + request + completion"
    conversation:
      - role: "user"
        content: "你好"
      - role: "assistant"
        content: "你好！有什么可以帮助你的吗？"
      - role: "user"
        content: "请帮我查看当前目录"
      - role: "assistant"
        content: "好的，当前目录包含以下文件和文件夹..."
    expected_latest_intent: "请帮我查看当前目录"
    expected_pending_followup_status: ""
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  - case_id: "short_session_002"
    description: "Request with follow-up confirmation"
    conversation:
      - role: "user"
        content: "帮我创建一个Python文件"
      - role: "assistant"
        content: "好的，你需要我帮你创建什么内容的Python文件？"
      - role: "user"
        content: "创建一个计算器类"
      - role: "assistant"
        content: "好的，我来创建计算器类。"
      - role: "user"
        content: "好"
    expected_latest_intent: "好"
    expected_pending_followup_status: "confirmed"
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  - case_id: "short_session_003"
    description: "Request with denial"
    conversation:
      - role: "user"
        content: "帮我删除所有临时文件"
      - role: "assistant"
        content: "删除临时文件可能会影响正在进行的操作，需要我帮你删除吗？"
      - role: "user"
        content: "不用了"
    expected_latest_intent: "不用了"
    expected_pending_followup_status: "denied"
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  - case_id: "short_session_004"
    description: "Request with pause"
    conversation:
      - role: "user"
        content: "帮我重构项目代码"
      - role: "assistant"
        content: "好的，需要我帮你重构哪些模块？"
      - role: "user"
        content: "先别重构，等我确认一下"
    expected_latest_intent: "先别重构，等我确认一下"
    expected_pending_followup_status: "paused"
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  - case_id: "short_session_005"
    description: "Request with redirect"
    conversation:
      - role: "user"
        content: "帮我实现登录功能"
      - role: "assistant"
        content: "好的，你需要什么类型的登录功能？"
      - role: "user"
        content: "改成注册功能"
    expected_latest_intent: "改成注册功能"
    expected_pending_followup_status: "redirected"
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  # =========================================================================
  # Category 2: Medium Sessions (10-20 turns)
  # =========================================================================

  - case_id: "medium_session_001"
    description: "Multi-step implementation with tool calls"
    conversation:
      - role: "user"
        content: "帮我创建一个用户管理模块"
      - role: "assistant"
        content: "好的，用户管理模块需要包含哪些功能？"
      - role: "user"
        content: "需要增删改查功能"
      - role: "assistant"
        content: "好的，我来为你创建用户管理模块，包含增删改查功能。"
      - role: "tool"
        content: "已创建 user_manager.py"
      - role: "assistant"
        content: "用户管理模块已创建，包含以下方法：create_user, get_user, update_user, delete_user。"
      - role: "user"
        content: "增加一个导出用户列表到CSV的功能"
      - role: "assistant"
        content: "好的，我来添加导出CSV的功能。"
      - role: "tool"
        content: "已更新 user_manager.py"
      - role: "assistant"
        content: "已添加 export_to_csv 方法。"
      - role: "user"
        content: "还需要导入功能"
      - role: "assistant"
        content: "好的，我来添加从CSV导入用户的功能。"
      - role: "tool"
        content: "已更新 user_manager.py"
      - role: "assistant"
        content: "已添加 import_from_csv 方法。"
      - role: "user"
        content: "完成了吗"
      - role: "assistant"
        content: "是的，用户管理模块已完成，包含增删改查、导入导出功能。"
    expected_latest_intent: "完成了吗"
    expected_pending_followup_status: ""
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  - case_id: "medium_session_002"
    description: "Bug fixing with multiple iterations"
    conversation:
      - role: "user"
        content: "帮我修复登录页面的bug"
      - role: "assistant"
        content: "好的，请描述一下bug的具体表现？"
      - role: "user"
        content: "点击登录按钮没有反应"
      - role: "assistant"
        content: "请让我查看一下登录页面的代码。"
      - role: "tool"
        content: "读取 login.js"
      - role: "assistant"
        content: "发现问题了，onClick处理器没有绑定。请问需要我帮你修复吗？"
      - role: "user"
        content: "需要"
      - role: "assistant"
        content: "好的，我来修复这个问题。"
      - role: "tool"
        content: "已更新 login.js"
      - role: "assistant"
        content: "已修复onClick绑定问题。"
      - role: "user"
        content: "还有其他问题吗"
      - role: "assistant"
        content: "让我检查一下是否有其他问题..."
      - role: "tool"
        content: "检查完成"
      - role: "assistant"
        content: "目前没有发现其他问题。"
      - role: "user"
        content: "好，测试一下"
    expected_latest_intent: "好，测试一下"
    expected_pending_followup_status: ""
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  - case_id: "medium_session_003"
    description: "Configuration with clarification"
    conversation:
      - role: "user"
        content: "帮我配置数据库连接"
      - role: "assistant"
        content: "好的，请告诉我你使用的是什么数据库？"
      - role: "user"
        content: "PostgreSQL"
      - role: "assistant"
        content: "好的，PostgreSQL连接需要哪些信息？"
      - role: "user"
        content: "host: localhost, port: 5432, database: myapp"
      - role: "assistant"
        content: "好的，还需要用户名和密码。"
      - role: "user"
        content: "用户名是admin，密码需要我提供吗？"
      - role: "assistant"
        content: "是的，请提供密码。"
      - role: "user"
        content: "密码是secret123"
      - role: "assistant"
        content: "好的，数据库配置已完成。配置如下：host=localhost, port=5432, database=myapp, user=admin。"
      - role: "user"
        content: "连接超时设置多少合适"
      - role: "assistant"
        content: "建议设置为30秒，对于大多数应用场景足够使用。"
      - role: "user"
        content: "好"
    expected_latest_intent: "好"
    expected_pending_followup_status: ""
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  - case_id: "medium_session_004"
    description: "Code review with follow-up confirmation"
    conversation:
      - role: "user"
        content: "帮我审查 src/main.py 的代码"
      - role: "assistant"
        content: "好的，我来审查代码。"
      - role: "tool"
        content: "读取 src/main.py"
      - role: "assistant"
        content: "代码审查完成，发现几个问题：1) 缺少错误处理 2) 有魔法数字需要定义为常量 3) 函数过长需要拆分。需要我帮你改进吗？"
      - role: "user"
        content: "需要"
      - role: "assistant"
        content: "好的，我来改进代码。"
      - role: "tool"
        content: "已更新 src/main.py"
      - role: "assistant"
        content: "代码已改进，添加了错误处理、常量定义，并拆分了过长函数。"
      - role: "user"
        content: "好"
    expected_latest_intent: "好"
    expected_pending_followup_status: "confirmed"
    expected_attention_roots_count: 2
    expect_seal_blocked: false

  # =========================================================================
  # Category 3: Long Sessions (30+ turns)
