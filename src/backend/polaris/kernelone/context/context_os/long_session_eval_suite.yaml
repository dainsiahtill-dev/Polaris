  # =========================================================================
  # Category 4: Multi-Topic Switching Scenarios
  # =========================================================================

  - case_id: "multi_topic_001"
    description: "Switch between unrelated topics"
    conversation:
      - role: "user"
        content: "帮我写一个排序算法"
      - role: "assistant"
        content: "好的，你需要哪种排序算法？"
      - role: "user"
        content: "快速排序"
      - role: "assistant"
        content: "好的，我来为你实现快速排序算法。"
      - role: "tool"
        content: "创建 sort.py"
      - role: "assistant"
        content: "快速排序算法已实现。"
      - role: "user"
        content: "顺便问下，今天天气怎么样"
      - role: "assistant"
        content: "天气查询功能尚未集成，但我可以帮你添加这个功能，需要吗？"
      - role: "user"
        content: "不需要，只是问问"
      - role: "assistant"
        content: "好的，没问题。"
      - role: "user"
        content: "继续刚才的排序，我还需要一个归并排序"
      - role: "assistant"
        content: "好的，我来添加归并排序算法。"
      - role: "tool"
        content: "更新 sort.py"
      - role: "assistant"
        content: "归并排序算法已添加。"
    expected_latest_intent: "继续刚才的排序，我还需要一个归并排序"
    expected_pending_followup_status: ""
    expected_attention_roots_count: 2
    expect_seal_blocked: false

