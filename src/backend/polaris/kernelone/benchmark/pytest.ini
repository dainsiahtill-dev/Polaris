# Pytest configuration for Benchmark Reporting Module
#
# This configuration supports both unit tests and integration tests
# for the CI/CD benchmark reporting system.

[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Output options
addopts =
    --strict-markers
    --tb=short
    --color=yes

# Coverage options (when running with --cov)
[coverage:run]
branch = True
source = polaris.kernelone.benchmark.reporting

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Benchmark markers
markers =
    benchmark: marks tests as benchmark tests (deselect with '-m "not benchmark"')
    slow: marks tests as slow running (deselect with '-m "not slow"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    ci: marks tests as CI/CD integration tests

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
