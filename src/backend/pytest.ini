[pytest]
norecursedirs =
    GitPolaris.tmp_pytest*
    tmp_pytest*
    .tmp_pytest*
    .git
    .venv
    venv
    __pycache__
    scripts
    # Exclude worktrees (these are isolated build directories)
    .claude/worktrees/*
    # Exclude tests with broken imports (deprecated modules)
    # REVIEW: test_lancedb_store_script.py - deprecated module import failure
    test_lancedb_store_script.py
    # REVIEW: test_llm_toolkit_executor_safety.py - deprecated module import failure
    test_llm_toolkit_executor_safety.py
    # REVIEW: test_role_tooling_security_hardening.py - deprecated module import failure
    test_role_tooling_security_hardening.py
    # REVIEW: test_roles_runtime_bus.py - deprecated module import failure
    test_roles_runtime_bus.py
    # Exclude agent_stress tests that require special test package setup
    tests/agent_stress
    # Exclude benchmark fixture workspaces (these are sandbox tests, not polaris tests)
    **/fixtures/agentic_benchmark/workspaces/*/tests
    **/fixtures/tool_calling_matrix/workspaces/*/tests

# Import mode to avoid module name conflicts (e.g., test_composer.py exists in multiple locations)
# NOTE: import_mode must be set via command line, not pytest.ini

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    contract: marks tests as contract tests

# Coverage configuration (requires pytest-cov)
# Run with: pytest --cov=polaris --cov-report=term-missing
addopts =
    -v
    --tb=short
    --strict-markers
    --import-mode=importlib

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning:polaris.kernelone.llm.tools
    ignore::DeprecationWarning:polaris.kernelone.llm.toolkit.definitions
    ignore::DeprecationWarning:polaris.domain.models.task
