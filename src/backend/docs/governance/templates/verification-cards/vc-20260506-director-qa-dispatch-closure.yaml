    - "ruff format src/backend/polaris/delivery/cli/pm/tasks_utils.py src/backend/polaris/delivery/cli/pm/orchestration_engine.py src/backend/polaris/cells/orchestration/pm_dispatch/internal/dispatch_pipeline.py src/backend/polaris/cells/director/execution/service.py src/backend/polaris/cells/orchestration/pm_planning/service.py src/backend/polaris/cells/orchestration/pm_planning/internal/pipeline_ports.py src/backend/polaris/cells/runtime/execution_broker/internal/service.py src/backend/polaris/kernelone/workflow/engine.py src/backend/polaris/kernelone/workflow/contracts.py src/backend/polaris/cells/orchestration/workflow_runtime/internal/embedded_api.py src/backend/polaris/cells/orchestration/workflow_runtime/internal/models.py"
  mypy:
    - "mypy src/backend/polaris/delivery/cli/pm/tasks_utils.py src/backend/polaris/delivery/cli/pm/orchestration_engine.py src/backend/polaris/cells/orchestration/pm_dispatch/internal/dispatch_pipeline.py src/backend/polaris/cells/director/execution/service.py src/backend/polaris/cells/orchestration/pm_planning/service.py src/backend/polaris/cells/orchestration/pm_planning/internal/pipeline_ports.py src/backend/polaris/cells/runtime/execution_broker/internal/service.py src/backend/polaris/kernelone/workflow/engine.py src/backend/polaris/kernelone/workflow/contracts.py src/backend/polaris/cells/orchestration/workflow_runtime/internal/embedded_api.py src/backend/polaris/cells/orchestration/workflow_runtime/internal/models.py"
  pytest:
    - "PYTHONPATH=src/backend python -m pytest src/backend/polaris/tests/unit/cells/orchestration/workflow_runtime/internal/test_embedded_api.py src/backend/polaris/cells/orchestration/workflow_runtime/tests/test_workflow_runtime_models.py src/backend/polaris/tests/test_pm_zero_tasks_fallback.py src/backend/polaris/tests/test_orchestration_engine_integration_qa.py src/backend/polaris/tests/test_director_service_convergence.py src/backend/polaris/cells/orchestration/pm_planning/tests/test_pm_service_broker.py src/backend/polaris/cells/orchestration/pm_planning/tests/test_pipeline_ports.py src/backend/polaris/cells/runtime/execution_broker/tests/test_service.py src/backend/polaris/kernelone/workflow/tests/test_kernelone_c_fixes.py src/backend/polaris/tests/unit/infrastructure/messaging/nats/test_ws_consumer_manager.py src/backend/polaris/tests/test_rate_limit_middleware.py -q"
  frontend:
