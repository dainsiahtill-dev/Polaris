      description: "Failed read-only turns must not terminate materialize-changes sessions"
      expected: "All targeted session orchestrator regressions pass"
      status: passed

    - file: "polaris/cells/roles/kernel/internal/transaction/tests/test_stream_orchestrator.py"
      description: "Continuation turns preserve materialize-changes delivery mode"
      expected: "All targeted stream orchestrator regressions pass"
      status: passed

    - file: "polaris/cells/roles/kernel/internal/transaction/tests/test_task_contract_builder.py"
