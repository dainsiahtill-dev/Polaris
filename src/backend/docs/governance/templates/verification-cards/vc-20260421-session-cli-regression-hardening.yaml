card_id: "vc-20260421-session-cli-regression-hardening"
bug_summary: >
  Director CLI sessions can fail deterministically on Windows-style file paths and then terminate
  incorrectly. The current chain combines malformed path normalization, continuation delivery-mode
  drift, and a session-level read-only termination exemption that ignores failed tool execution.

classification: structural

bug_path:
  file: "polaris/cells/roles/runtime/internal/session_orchestrator.py"
  method: "RoleSessionOrchestrator.execute_stream"
  symptom: "A MATERIALIZE_CHANGES CLI task degrades into analysis-only output and ends the session after a failed read"

assumptions:
  - id: "A1"
    statement: "Windows absolute paths inside the workspace should be normalized, not rejected as traversal."
    status: verified_true
    evidence: "tool_batch_executor.py rewrites existing file paths before tool execution, proving normalization is an intended behavior."

  - id: "A2"
    statement: "Continuation turns must preserve the original delivery contract for session-level tasks."
    status: verified_true
    evidence: "stream_orchestrator.py already contains special continuation logic and tries to reuse frozen original delivery mode."

  - id: "A3"
    statement: "Visible analysis text after a failed read is not sufficient evidence to end a materialize-changes session."
    status: verified_true
    evidence: "session_orchestrator.py currently exempts read-only auto-continue turns without checking receipt success or unsatisfied mutation obligation."

pre_mortem:
  failure_point: >
    The highest risk is over-correcting termination behavior and accidentally trapping legitimate
    analyze-only tasks in extra turns, or weakening traversal protection while fixing Windows path normalization.
  risk_zone:
    - "polaris/cells/roles/runtime/internal/session_orchestrator.py"
    - "polaris/cells/roles/kernel/internal/transaction/stream_orchestrator.py"
    - "polaris/cells/roles/kernel/internal/transaction/tool_batch_executor.py"
    - "polaris/cells/roles/kernel/internal/llm_caller/invoker.py"

verification_plan:
