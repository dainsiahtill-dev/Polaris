      - polaris/cells/orchestration/pm_planning/pipeline.py
      - polaris/cells/orchestration/pm_dispatch/internal/iteration_state.py
  verification_plan:
    unit_tests:
      - test_traceability_service_register_node
      - test_traceability_service_build_matrix
      - test_traceability_service_persist_and_load
      - test_traceability_service_find_node
      - test_traceability_gate_consistency_check
      - test_blueprint_persistence_save_load_delete
      - test_adr_store_create_propose_compile
      - test_adr_store_persistence_roundtrip
      - test_safety_wrapper_suppresses_exceptions
    integration_tests:
      - test_full_pm_iteration_produces_traceability_matrix
    manual_checks:
      - Verify runtime/traceability/*.matrix.json is valid JSON and conforms to schema
