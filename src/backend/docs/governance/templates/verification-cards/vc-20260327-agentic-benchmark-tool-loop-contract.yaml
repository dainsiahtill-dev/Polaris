card_id: "vc-20260327-agentic-benchmark-tool-loop-contract"
bug_summary: >
  `python -m polaris.delivery.cli agentic-eval --workspace .` 的 agentic benchmark
  在真实 runtime 下 6/6 失败；核心症状是 benchmark 合同没有穿透到执行提示，且 TurnEngine
  只跑一轮 LLM/工具循环；进一步审计确认 `ollama` 工具能力链路与 benchmark 判定器本身也存在结构性缺口。

classification: structural

bug_path:
  file: "polaris/cells/roles/kernel/internal/turn_engine.py"
  method: "run_stream() / run()"
  symptom: "首个 tool_call 后直接 complete，或在没有原生工具 trace 时输出不满足 benchmark 合同"

assumptions:
  - id: "A1"
    statement: "我假设 chief_engineer/director 的主要失败不是 judge 误判，而是流式执行链路在首个工具调用后提前结束。"
    status: verified_true
    evidence: >
      读取 .polaris/runtime/llm_evaluations/ef5ffcf7/AGENTIC_BENCHMARK_REPORT.json，
      chief_engineer_blueprint_review / director_* 的 raw_events 只有 fingerprint、tool_call、complete；
      complete.result 中 content 为空、tool_calls 为空。

  - id: "A2"
    statement: "我假设 run_stream() 目前并没有真正的 transcript-driven loop，而是执行完单轮后直接 return。"
    status: verified_true
    evidence: >
      读取 polaris/cells/roles/kernel/internal/turn_engine.py，
      run_stream() 主体被包在 `if True:` 单次分支里，步骤 7 append transcript 后立刻 yield complete 并 return，
      没有进入下一轮 LLM 调用。

  - id: "A3"
    statement: "我假设非流式 run() 也存在同类单轮问题，因此 benchmark 和普通 session 在工具结果回灌上共享同一错误假设。"
    status: verified_true
    evidence: >
      同文件 run() 在执行一次 LLM 调用与一次工具批执行后直接构造 RoleTurnResult 返回，
      没有二次调用 build_context_request() + llm_caller.call()。

  - id: "A4"
    statement: "我假设 PM/QA/Architect 的 benchmark 失败，不仅因为模型行为不稳，还因为 benchmark judge 的合同没有进入 runtime 提示与修复回路。"
    status: verified_true
    evidence: >
      读取 polaris/cells/llm/evaluation/internal/agentic_benchmark.py，
      case 的 required_tools / required_output_substrings / validators 仅用于 judge_agentic_case；
      ExecuteRoleSessionCommandV1 只传原始 prompt，没有把 benchmark 合同写进 prompt_appendix 或等价执行合同。

  - id: "A5"
    statement: "我假设 PromptBuilder 的工具策略提示缺少当前用户消息，会削弱基于任务语义的 intent 推断。"
    status: verified_true
    evidence: >
      读取 polaris/cells/roles/kernel/internal/prompt_builder.py 与 kernel.py，
      build_system_prompt() 支持 message 参数用于 infer_turn_intent，
      但 _build_system_prompt_for_request() 调用时没有把 request.message 传进去。

  - id: "A6"
    statement: "我假设 `ollama` 运行时即使被判定为可用模型，也没有把 `tools` 真正传入 `/api/chat` 流式链路，因此 benchmark 的 native tool trace 在 provider 层丢失。"
    status: verified_true
    evidence: >
      读取 polaris/infrastructure/llm/providers/ollama_provider.py，
      旧实现的 invoke()/invoke_stream() 只发送 messages/prompt，不发送 tools；
      且没有 invoke_stream_events()，StreamExecutor 只能退回纯文本兼容路径。

  - id: "A7"
    statement: "我假设 ModelCatalog 对带仓库前缀的本地模型名（如 `modelscope.cn/.../Qwen3...`）能力识别失真，导致 runtime 无法稳定判断工具能力。"
    status: verified_true
    evidence: >
      读取 polaris/kernelone/llm/engine/model_catalog.py，
      已知能力只按前缀 `qwen` / `llama` 匹配；对 `modelscope.cn/unsloth/Qwen3...`
      这类带 registry 前缀的模型标识不会命中 supports_tools 能力。

  - id: "A8"
    statement: "我假设 benchmark 的 `structured_steps` 判定器存在实现缺陷，会把‘前面有一句说明、后面有编号步骤’的合法回答误判为失败。"
    status: verified_true
    evidence: >
      读取 polaris/cells/llm/evaluation/internal/utils.py，
      looks_like_structured_steps() 使用 `^` 正则但没有 multiline 语义，
      因而只会检查整段开头，无法识别后续行的 `1.` / `2.`。

pre_mortem:
  failure_point: >
    如果我只补 benchmark prompt appendix，却不修 TurnEngine 的多轮循环，
    chief_engineer/director 仍会在首个工具调用后结束；反过来若只修循环而不让 benchmark 合同进入 runtime，
    PM/QA/Architect 仍可能继续输出泛化格式而非 case 需要的 JSON/步骤。
  risk_zone:
    - "polaris/cells/llm/evaluation/internal/agentic_benchmark.py"
    - "polaris/cells/llm/evaluation/internal/utils.py"
    - "polaris/cells/roles/kernel/internal/turn_engine.py"
    - "polaris/cells/roles/kernel/internal/kernel.py"
    - "polaris/kernelone/llm/engine/model_catalog.py"
    - "polaris/infrastructure/llm/providers/ollama_provider.py"
    - "polaris/kernelone/llm/provider_adapters/ollama_chat_adapter.py"
    - "polaris/cells/roles/kernel/tests/test_kernel_stream_tool_loop.py"
    - "polaris/cells/roles/kernel/tests/test_run_stream_parity.py"
    - "tests/test_llm_agentic_benchmark.py"

verification_plan:
  unit_tests:
    - file: "tests/test_llm_agentic_benchmark.py"
      description: "benchmark suite 将 case 合同写入 prompt_appendix / metadata，并保持 case 映射稳定"
      expected: "Fake executor 仍能按 metadata 映射 case，附加合同不会破坏报告落盘"
      status: existing_fix
    - file: "polaris/cells/roles/kernel/tests/test_kernel_stream_tool_loop.py"
      description: "run_stream 在首轮工具调用后继续第二轮，并把 transcript history 传给下一轮"
      expected: "captured_contexts 为 2，complete.result.content 来自第二轮最终回答"
      status: existing_fix
    - file: "polaris/cells/roles/kernel/tests/test_kernel_stream_tool_loop.py"
      description: "run 在工具结果回灌后继续下一轮，并返回最终回答而不是首轮工具意图文本"
      expected: "captured_contexts 为 2，RoleTurnResult.content 为第二轮总结"
      status: existing_fix
    - file: "polaris/cells/roles/kernel/tests/test_run_stream_parity.py"
      description: "run / run_stream 在多轮工具循环下保持相同最终内容、tool_calls 与 transcript 语义"
      expected: "两条路径都进行两轮调用并输出相同最终结果"
      status: existing_fix
    - file: "tests/test_kernelone_trace_and_stream.py"
      description: "Ollama 原生流式事件能被 structured stream path 解码为 reasoning/tool_call"
      expected: "native `/api/chat` tool_calls 进入 TOOL_CALL 事件，arguments 不丢失"
      status: new
    - file: "tests/test_llm_token_budget.py"
      description: "带 registry 前缀的 Qwen 模型名仍能命中已知能力目录"
      expected: "ModelCatalog.resolve(...Qwen3...) 返回 supports_tools=True"
      status: new
    - file: "tests/test_llm_deterministic_judge.py"
      description: "structured_steps 判定接受‘前置一句说明 + 后续编号步骤’"
      expected: "looks_like_structured_steps() 对多行编号步骤返回 True"
      status: new
  integration_tests:
    - description: "benchmark 核心单测 + loop/parity 回归"
      command: "python -m pytest -q tests/test_llm_agentic_benchmark.py polaris/cells/roles/kernel/tests/test_kernel_stream_tool_loop.py polaris/cells/roles/kernel/tests/test_run_stream_parity.py"
      status: existing_fix
    - description: "provider / catalog / judge 回归"
      command: "python -m pytest -q tests/test_enhanced_providers.py tests/test_kernelone_trace_and_stream.py tests/test_llm_token_budget.py tests/test_llm_caller.py tests/test_llm_deterministic_judge.py"
      status: new
    - description: "真实 agentic benchmark CLI 回归"
      command: "python -m polaris.delivery.cli agentic-eval --workspace ."
      status: new
  manual_check:
    - "确认 agentic benchmark 审计包里 chief_engineer/director 不再出现 `tool_call -> complete(content='')` 的提前结束模式。"
    - "确认 PM/QA/Architect 的 case 看到 benchmark 合同后，会优先调用 `read_file` 并产出 case 指定格式。"

related_adrs:
  - "ADR-0058"

