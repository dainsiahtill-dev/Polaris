work_packages:
  wp1_orchestrator_slim:
    description: "Orchestrator 瘦身与 MagicMock 清除"
    checks:
      - id: "WP1-C1"
        description: "orchestrator.py 不包含 from unittest.mock import MagicMock"
        type: grep_absent
        pattern: "from unittest.mock import MagicMock"
        file: "polaris/kernelone/cognitive/orchestrator.py"

      - id: "WP1-C2"
        description: "orchestrator.py 不包含 isinstance(..., MagicMock)"
        type: grep_absent
        pattern: "MagicMock"
        file: "polaris/kernelone/cognitive/orchestrator.py"

      - id: "WP1-C3"
        description: "_build_blocked_response 方法存在"
        type: grep_present
        pattern: "def _build_blocked_response"
        file: "polaris/kernelone/cognitive/orchestrator.py"

      - id: "WP1-C4"
        description: "blocked_turn 构建代码不超过 2 处（应为 1 处定义 + 调用点）"
        type: count_lt
        pattern: "blocked_turn = ConversationTurn"
        file: "polaris/kernelone/cognitive/orchestrator.py"
        max_count: 2

      - id: "WP1-C5"
        description: "hasattr 防御性检查不超过 3 处"
        type: count_lt
        pattern: "hasattr("
        file: "polaris/kernelone/cognitive/orchestrator.py"
        max_count: 3

      - id: "WP1-C6"
        description: "所有现有测试通过"
        type: pytest
        path: "polaris/kernelone/cognitive/tests/"

