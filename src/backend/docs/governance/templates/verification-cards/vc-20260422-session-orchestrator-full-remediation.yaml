card_id: "vc-20260422-session-orchestrator-full-remediation"
bug_summary: >
  MATERIALIZE_CHANGES sessions can enter an exploration loop and exhaust max turns without
  progressing to read/write. The loop is caused by BatchReceipt model receipts being dropped
  during continuation merge, weak working-memory truth propagation, prompt-only enforcement,
  and cross-turn tool-count leakage when run_id is empty in real CLI flows.

classification: structural

bug_path:
  file: "polaris/cells/roles/runtime/internal/session_orchestrator.py"
  method: "RoleSessionOrchestrator.execute_stream"
  symptom: "Repeated glob/repo_rg turns with no read/write materialization until max_turns_exceeded"

assumptions:
  - id: "A1"
    statement: "Continuation batch_receipt must preserve ToolBatchRuntime BatchReceipt model objects as merged results."
    status: verified_true
    evidence: "tool_batch_executor _merge_batch_receipts accepted only dict and skipped BatchReceipt model objects."

  - id: "A2"
    statement: "Glob/repo_rg tool payloads are present in real execution, but empty merged receipts prevent them from reaching continuation working memory."
    status: verified_true
    evidence: "real CLI log shows tool_gateway success for repo_tree/repo_rg/glob while continue_multi_turn merged_receipt_summary remains results=0."

  - id: "A3"
    statement: "Turn boundary reset cannot depend only on request.run_id because run_id may be empty in real flows."
    status: verified_true
    evidence: "real CLI logs show request.run_id=None while max_tool_calls_per_turn accumulates across turns."

  - id: "A4"
    statement: "Instruction-only mitigation is insufficient; repeated exploration-only turns require executor hard-block."
    status: verified_true
    evidence: "real CLI logs show 10-turn exploring loop despite repeated mandatory instructions."

  - id: "A5"
    statement: "Once target file paths are already known, recovery should reuse bootstrap-read flow instead of relying on another LLM-only reminder."
    status: verified_true
    evidence: "retry_orchestrator already owns stale-edit bootstrap read path and can be extended for known-target read recovery."

pre_mortem:
  failure_point: >
    Highest risk is introducing an over-strict exploration guard that blocks legitimate first-turn discovery,
    or changing receipt shape incompatibly with existing event consumers.
  risk_zone:
    - "polaris/cells/roles/runtime/internal/session_orchestrator.py"
    - "polaris/cells/roles/kernel/internal/transaction/tool_batch_executor.py"
    - "polaris/cells/roles/kernel/internal/kernel/core.py"

verification_plan:
  unit_tests:
    - file: "polaris/cells/roles/runtime/internal/tests/test_session_orchestrator.py"
      description: "working memory extraction + mutation exploring instruction hardening"
      expected: "new/updated tests pass"
      status: passed

    - file: "polaris/cells/roles/kernel/tests/test_mutation_guard_soft_mode.py"
      description: "continue_multi_turn carries merged batch receipt from BatchReceipt model objects + exploration streak hard-block enforcement"
      expected: "new regression test passes"
      status: passed

    - file: "polaris/cells/roles/kernel/tests/test_mutation_guard_soft_mode.py"
      description: "exploration hard-block emits structured ErrorEvent, known-target guard works, and direct read evidence is tracked"
      expected: "new regression tests pass"
      status: passed

    - file: "polaris/cells/roles/kernel/internal/kernel/tests/test_facade_refactor.py"
