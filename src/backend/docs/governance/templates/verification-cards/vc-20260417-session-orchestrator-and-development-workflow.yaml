      expected: "25/25 PASS"
      status: existing

  integration_tests:
    - description: "3-turn AUTO_CONTINUE 链式会话"
      command: "python -m pytest -q polaris/cells/roles/runtime/internal/tests/test_session_orchestrator.py -k test_multi_turn"
      expected: "turn_count == 2，artifacts 已聚合"
      status: completed

    - description: "DevelopmentWorkflowRuntime 端到端 patch→test 闭环"
      command: "python -m pytest -q polaris/cells/roles/kernel/internal/tests/test_development_workflow_runtime.py -k test_execute_stream"
      expected: "事件序列完整，测试通过消息存在"
      status: completed

    - description: "TurnTransactionController development handoff 流式透传"
      command: "python -m pytest -q polaris/cells/roles/kernel/tests/test_transaction_controller_development_handoff.py -k test_handle_development_handoff_stream"
      expected: "事件流包含 TurnPhaseEvent -> ContentChunkEvent -> CompletionEvent"
      status: completed

    - description: "RoleConsoleHost orchestrator 端到端集成（Feature Flag + 事件日志隔离）"
      command: "python -m pytest -q polaris/delivery/cli/director/tests/test_console_host_orchestrator.py"
      expected: "25/25 PASS"
      status: completed

    - description: "全目录回归测试（kernel + runtime）"
      command: "python -m pytest -q polaris/cells/roles/kernel/tests polaris/cells/roles/runtime/tests"
      expected: "1164 passed, 1 skipped, 0 failed"
      status: completed

  manual_check:
    - "在真实工作区下运行 RoleSessionOrchestrator.execute_stream，验证 checkpoint 文件生成路径 .polaris/checkpoints/{session_id}.json"
    - "验证 SessionArtifactStore 对相同 original_hash 的 artifact 只生成一次 _full.json，后续生成 _delta.patch"
    - "开启 ENABLE_SPECULATIVE_EXECUTION=1 后，检查 ShadowEngine 的 cross-turn speculation 是否被正确消费"

