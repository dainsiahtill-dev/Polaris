      expected: "19/19 PASS"
      status: existing

    - file: "polaris/cells/roles/runtime/internal/tests/test_session_artifact_store.py"
      description: "SessionArtifactStore 增量持久化、去重压缩、delta 生成"
      expected: "6/6 PASS"
      status: existing

    - file: "polaris/cells/roles/runtime/internal/tests/test_session_orchestrator.py"
      description: "RoleSessionOrchestrator 单轮结束、多轮 AUTO_CONTINUE、WAITING_HUMAN 中断、max_turns 熔断、ShadowEngine 预热消费、checkpoint 写入"
      expected: "7/7 PASS"
      status: existing

    - file: "polaris/cells/roles/kernel/internal/tests/test_development_workflow_runtime.py"
