id: vc-20260423-super-mode-director-continuation-integrity
title: Super Mode Director Continuation Integrity
date: 2026-04-23
status: draft
classification: structural
systemic: true
scope:
  - polaris/delivery/cli/terminal_console.py
  - polaris/cells/roles/runtime/internal/session_orchestrator.py
  - polaris/cells/roles/kernel/internal/transaction/phase_manager.py
