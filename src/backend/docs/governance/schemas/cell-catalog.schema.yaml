$schema: "https://json-schema.org/draft/2020-12/schema"
title: ACGA Cell Catalog
type: object
additionalProperties: false
required:
  - version
  - catalog_id
  - description
  - owners
  - migration_status
  - cells

properties:
  version:
    type: integer
    minimum: 1
  catalog_id:
    type: string
    minLength: 3
  description:
    type: string
    minLength: 10
  owners:
    type: array
    minItems: 1
    items:
      type: string
  migration_status:
    type: string
  cells:
    type: array
    minItems: 1
    items:
      $ref: "./cell.schema.yaml"
