$schema: "https://json-schema.org/draft/2020-12/schema"
title: ACGA Migration Ledger
type: object
additionalProperties: false
required:
  - version
  - ledger_id
  - description
  - authority_docs
  - status_model
  - legacy_policies
  - units

properties:
  version:
    type: integer
    minimum: 1
  ledger_id:
    type: string
    minLength: 3
  description:
    type: string
    minLength: 10
  authority_docs:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 3
  status_model:
    type: object
    minProperties: 1
    additionalProperties:
      type: object
      additionalProperties: false
      required:
        - meaning
      properties:
        meaning:
          type: string
          minLength: 8
  legacy_policies:
    type: object
    minProperties: 1
    additionalProperties:
      type: string
      minLength: 8
  units:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - wave
        - category
        - scope
        - status
        - current_impl_state
        - owner
        - target
        - source_refs
        - verification
        - delete_when
      properties:
        id:
          type: string
          pattern: "^mig-[a-z0-9-]+$"
        title:
          type: string
          minLength: 8
        wave:
          type: integer
          minimum: 1
        category:
          type: string
          minLength: 2
        scope:
          type: string
          enum:
            - cell
            - workflow
            - capability_cluster
            - file_family
        status:
          type: string
          enum:
            - planned
            - in_progress
            - code_moved
            - imports_switched
            - shim_only
            - verified
            - retired
            - blocked
        current_impl_state:
          type: string
          enum:
            - legacy_only
            - mixed
            - new_root_partial
            - new_root_primary
            - retired
        owner:
          type: string
          minLength: 2
        depends_on:
          type: array
          items:
            type: string
            pattern: "^mig-[a-z0-9-]+$"
        blockers:
          type: array
          items:
            type: string
            minLength: 3
        legacy_policy:
          type: string
          minLength: 3
        notes:
          type: array
          items:
            type: string
            minLength: 3
        target:
          type: object
          additionalProperties: false
          required:
            - cell
            - catalog_status
            - target_assets_status
            - root_dirs
            - target_paths
          properties:
            cell:
              type: string
              pattern: "^[a-z0-9_]+\\.[a-z0-9_]+$"
            catalog_status:
              type: string
              enum:
                - actual
                - missing
            target_assets_status:
              type: string
              enum:
                - absent
                - partial_impl
                - active_impl
            root_dirs:
              type: array
              minItems: 1
              items:
                type: string
            target_paths:
              type: array
              minItems: 1
              items:
                type: string
            actual_impl_paths:
              type: array
              items:
                type: string
            subgraphs:
              type: array
              items:
                type: string
        source_refs:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - path
              - kind
              - coverage
              - note
            properties:
              path:
                type: string
                minLength: 3
              kind:
                type: string
                enum:
                  - file
                  - directory
                  - glob
                  - file_family
                  - module_slice
              coverage:
                type: string
                enum:
                  - full
                  - partial
              note:
                type: string
                minLength: 8
        verification:
          type: object
          additionalProperties: false
          required:
            - checks
            - docs_updates
            - graph_updates
          properties:
            checks:
              type: array
              minItems: 1
              items:
                type: string
                minLength: 8
            required_tests:
              type: array
              items:
                type: string
            docs_updates:
              type: array
              minItems: 1
              items:
                type: string
            graph_updates:
              type: array
              minItems: 1
              items:
                type: string
        delete_when:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 8
