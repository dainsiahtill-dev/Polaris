$schema: "https://json-schema.org/draft/2020-12/schema"
title: External Cell Plugin Manifest
type: object
additionalProperties: false
required:
  - manifest_version
  - plugin_id
  - display_name
  - publisher
  - plugin_version
  - cell_id
  - cell_manifest
  - sdk
  - runtime
  - capabilities
  - verification
  - distribution

$defs:
  token_list:
    type: array
    items:
      type: string
      minLength: 1
  test_list:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1

properties:
  manifest_version:
    type: integer
    const: 1
  plugin_id:
    type: string
    pattern: "^[a-z0-9_]+(?:\\.[a-z0-9_]+)+$"
  display_name:
    type: string
    minLength: 1
  publisher:
    type: string
    minLength: 1
  plugin_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(?:[-+][a-zA-Z0-9_.-]+)?$"
  cell_id:
    type: string
    pattern: "^[a-z0-9_]+(?:\\.[a-z0-9_]+)+$"
  cell_manifest:
    type: string
    minLength: 1
  sdk:
    type: object
    additionalProperties: false
    required:
      - version
      - entrypoint
      - python
    properties:
      version:
        type: string
        minLength: 1
      entrypoint:
        type: string
        minLength: 1
      python:
        type: string
        minLength: 1
  runtime:
    type: object
    additionalProperties: false
    required:
      - process_model
      - ipc
      - default_enabled
    properties:
      process_model:
        type: string
        enum:
          - isolated_process
      ipc:
        type: string
        minLength: 1
      default_enabled:
        type: boolean
      startup_timeout_seconds:
        type: integer
        minimum: 1
      shutdown_timeout_seconds:
        type: integer
        minimum: 1
      max_memory_mb:
        type: integer
        minimum: 16
      cpu_quota:
        type: string
        minLength: 1
      network_mode:
        type: string
        minLength: 1
  capabilities:
    type: object
    additionalProperties: false
    required:
      - tokens
    properties:
      tokens:
        $ref: "#/$defs/token_list"
  verification:
    type: object
    additionalProperties: false
    required:
      - verify_pack
      - tests
    properties:
      verify_pack:
        type: string
        minLength: 1
      tests:
        $ref: "#/$defs/test_list"
  distribution:
    type: object
    additionalProperties: false
    required:
      - sbom
      - signature
    properties:
      sbom:
        type: string
        minLength: 1
      signature:
        type: string
        minLength: 1
