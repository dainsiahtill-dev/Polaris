$schema: "https://json-schema.org/draft/2020-12/schema"
title: ACGA Semantic Descriptor Cache
type: object
required:
  - version
  - generated_at
  - workspace
  - embedding_runtime_fingerprint
  - descriptors
properties:
  version:
    type: integer
    minimum: 1
  generated_at:
    type: string
    minLength: 1
  workspace:
    type: string
    minLength: 1
  embedding_runtime_fingerprint:
    type: string
    minLength: 1
  descriptors:
    type: array
    items:
      $ref: "#/$defs/descriptor"
$defs:
  descriptor:
    type: object
    required:
      - cell_id
      - title
      - primary_category
      - domain
      - kind
      - visibility
      - stateful
      - owner
      - capability_summary
      - purpose
      - schema_version
      - descriptor_version
      - generated_at
      - graph_fingerprint
      - descriptor_hash
      - embedding_runtime_fingerprint
      - derived_from
      - classification
      - subgraphs
      - when_to_use
      - when_not_to_use
      - responsibilities
      - non_goals
      - invariants
      - key_invariants
      - testability
      - public_contracts
      - dependencies
      - state_owners
      - effects_allowed
      - source_hash
      - descriptor_text
      - embedding_vector
      - embedding_provider
      - embedding_model_name
      - embedding_device
    properties:
      cell_id:
        type: string
        minLength: 1
      title:
        type: string
      primary_category:
        type: string
      domain:
        type: string
      kind:
        type: string
      visibility:
        type: string
      stateful:
        type: boolean
      owner:
        type: string
      capability_summary:
        type: string
      purpose:
        type: string
      schema_version:
        type: integer
        minimum: 1
      descriptor_version:
        type: integer
        minimum: 1
      generated_at:
        type: string
        minLength: 1
      graph_fingerprint:
        type: string
        minLength: 1
      descriptor_hash:
        type: string
        minLength: 1
      embedding_runtime_fingerprint:
        type: string
        minLength: 1
      derived_from:
        type: object
        required:
          - cell_manifest
          - readme
          - context_pack
          - code_fingerprint
        properties:
          cell_manifest:
            type: string
          readme:
            type: string
          context_pack:
            type: string
          code_fingerprint:
            type: string
      classification:
        type: object
        required:
          - plane
          - kind
          - domain
          - role
          - state_profile
          - effect_profile
          - criticality
        properties:
          plane:
            type: string
          kind:
            type: string
          domain:
            type: string
          role:
            type: string
          state_profile:
            type: string
          effect_profile:
            type: array
            items:
              type: string
          criticality:
            type: string
      subgraphs:
        type: array
        items:
          type: string
      when_to_use:
        type: array
        items:
          type: string
      when_not_to_use:
        type: array
        items:
          type: string
      responsibilities:
        type: array
        items:
          type: string
      non_goals:
        type: array
        items:
          type: string
      invariants:
        type: array
        items:
          type: string
      key_invariants:
        type: array
        items:
          type: string
      testability:
        type: object
      classification_tags:
        type: array
        items:
          type: string
      public_contracts:
        type: object
      dependencies:
        type: array
        items:
          type: string
      state_owners:
        type: array
        items:
          type: string
      effects_allowed:
        type: array
        items:
          type: string
      owned_paths:
        type: array
        items:
          type: string
      source_files:
        type: array
        items:
          type: string
      source_hash:
        type: string
      descriptor_text:
        type: string
      embedding_vector:
        type: array
        minItems: 1
        items:
          type: number
      embedding_provider:
        type: string
        minLength: 1
      embedding_model_name:
        type: string
        minLength: 1
      embedding_device:
        type: string
        minLength: 1
      search_score:
        type: number
      metadata:
        type: object
