$schema: "https://json-schema.org/draft/2020-12/schema"
title: Execution Result
description: >
  Director execution output package consumed by QA and audit projections.
type: object
additionalProperties: false
required:
  - version
  - workspace
  - trace_id
  - task_id
  - blueprint_id
  - status
  - executed_at

properties:
  version:
    type: integer
    minimum: 1
  workspace:
    type: string
    minLength: 1
  trace_id:
    type: string
    minLength: 1
  run_id:
    type: string
  task_id:
    type: string
    minLength: 1
  plan_id:
    type: string
  plan_revision_id:
    type: string
  blueprint_id:
    type: string
    minLength: 1
  executor_role:
    type: string
    default: director
  status:
    type: string
    enum:
      - success
      - partial
      - blocked
      - failed
  summary:
    type: string
  modified_files:
    type: array
    items:
      type: string
      minLength: 1
  patch_refs:
    type: array
    items:
      type: string
      minLength: 1
  artifact_refs:
    type: array
    items:
      type: string
      minLength: 1
  tool_calls:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - tool
        - outcome
      properties:
        tool:
          type: string
          minLength: 1
        outcome:
          type: string
          minLength: 1
        unauthorized:
          type: boolean
        duration_ms:
          type: integer
          minimum: 0
  test_results:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - status
      properties:
        name:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - passed
            - failed
            - skipped
        details:
          type: string
  error:
    type: object
    additionalProperties: false
    properties:
      code:
        type: string
      message:
        type: string
      retriable:
        type: boolean
  cost_tokens:
    type: integer
    minimum: 0
  llm_provider:
    type: string
  duration_ms:
    type: integer
    minimum: 0
  executed_at:
    type: string
    format: date-time
