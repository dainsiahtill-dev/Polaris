      - fail if any BLE001 blind exception found

  - id: EXC-002
    severity: warning
    description: >
      Silent exception handling (try-except-pass) swallows exceptions without
      logging or recovery. Use contextlib.suppress() for intentional suppression,
      or log the exception.
    evidence:
      - polaris/kernelone/
      - polaris/infrastructure/
    current_status: enforced_non_regressive
    desired_automation:
      - python -m ruff check polaris/kernelone/ polaris/infrastructure/ --select=SIM105 --output-format=concise
      - fail if any try-except-pass found

  - id: EXC-003
    severity: warning
    description: >
      Exception logging must include exc_info=True to provide stack trace
      context. Without it, log messages are incomplete and debugging is harder.
    evidence:
      - polaris/kernelone/
      - polaris/infrastructure/
    current_status: enforced
    # Migrated 2026-04-24: grep-based automation is deterministic; low risk of false positives.
