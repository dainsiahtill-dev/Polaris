  - id: EXC-001
    severity: blocker
    description: >
      Blind exception catching (except Exception: or except:) is forbidden in
      critical paths. It catches everything including KeyboardInterrupt and
      SystemExit, which prevents proper shutdown and error recovery.
    evidence:
      - polaris/kernelone/
      - polaris/infrastructure/
    current_status: enforced_non_regressive
    desired_automation:
