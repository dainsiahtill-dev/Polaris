version: 1
rules:
  - id: manifest_schema_valid
    severity: blocker
    description: >
      Every Cell catalog, Cell manifest, Subgraph manifest, and Context Pack
      must validate against the corresponding schema.
    evidence:
      - docs/governance/schemas/cell.schema.yaml
      - docs/governance/schemas/cell-catalog.schema.yaml
      - docs/governance/schemas/subgraph.schema.yaml
      - docs/governance/schemas/context-pack.schema.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - validate docs/graph/catalog/cells.yaml
      - validate docs/graph/subgraphs/*.yaml
      - validate generated context packs
      - run docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --baseline tests/architecture/allowlists/catalog_governance_gate.baseline.json

  - id: migration_ledger_schema_valid
    severity: blocker
    description: >
      The migration ledger must validate against its schema so that AI/Agent
      migrations operate on a stable execution model instead of free-form prose.
    evidence:
      - docs/migration/ledger.yaml
      - docs/governance/schemas/migration-ledger.schema.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - validate docs/migration/ledger.yaml
      - fail if required unit fields or status enums drift

  - id: no_cross_cell_internal_import
    severity: blocker
    description: >
      Cross-Cell imports may only target a Cell's public surface. Direct imports
      into another Cell's internal implementation are forbidden.
    evidence:
      - docs/ARCHITECTURE_SPEC.md
      - docs/graph/catalog/cells.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - map file path to owning Cell
      - parse imports
      - fail if import crosses ownership without public contract allowance
      - run docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --baseline tests/architecture/allowlists/catalog_governance_gate.baseline.json

  - id: declared_cell_dependencies_match_imports
    severity: high
    description: >
      Every cross-Cell code dependency must be declared in the source Cell's
      `depends_on`. The catalog is the governance truth; code imports may not
      silently expand the dependency graph.
    evidence:
      - docs/graph/catalog/cells.yaml
      - polaris/cells/**/cell.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - map python source files under polaris/cells/** to owning Cells
      - parse absolute imports that target other Cells
      - aggregate source Cell -> target Cell edges
      - fail on any new edge missing from catalog `depends_on`
      - run docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --baseline tests/architecture/allowlists/catalog_governance_gate.baseline.json

  - id: owned_paths_do_not_overlap
    severity: blocker
    description: >
      `owned_paths` must not overlap across Cells unless an explicit temporary
      migration exception is recorded.
    evidence:
      - docs/graph/catalog/cells.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - expand globs
      - detect duplicate ownership
      - report owning Cells and paths
      - run docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --baseline tests/architecture/allowlists/catalog_governance_gate.baseline.json

  - id: single_state_owner
    severity: blocker
    description: >
      Every source-of-truth state must have exactly one owner Cell.
    evidence:
      - docs/graph/catalog/cells.yaml
      - docs/graph/subgraphs/*.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - aggregate `state_owners`
      - fail on duplicate ownership
      - run docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --baseline tests/architecture/allowlists/catalog_governance_gate.baseline.json

  - id: explicit_utf8_text_io
    severity: blocker
    description: >
      All text file reads and writes must use explicit UTF-8.
    evidence:
      - AGENTS.md
      - test_storage_layout.py
      - test_imports.py
    current_status: partially_enforced
    desired_automation:
      - static search for open() without encoding
      - enforce `encoding="utf-8"` on text I/O

  - id: opencode_canonical_entrypoint_non_regressive
    severity: high
    description: >
      OpenCode-derived mechanisms (typed events, tool state, part types,
      replacer chain) must be consumed through package-level canonical
      entrypoints to prevent deep-module forks and parallel semantics.
    evidence:
      - docs/KERNELONE_OPENCODE_INTEGRATION_ARCHITECTURE.md
      - polaris/kernelone/events/typed/__init__.py
      - polaris/kernelone/tool/__init__.py
      - polaris/kernelone/messages/__init__.py
      - polaris/kernelone/editing/replacers/__init__.py
    current_status: enforced
    desired_automation:
      - run docs/governance/ci/scripts/run_opencode_convergence_gate.py --workspace . --mode hard-fail

  - id: undeclared_effects_forbidden
    severity: blocker
    description: >
      File writes, network calls, process launches, and database writes must map
      to a declared effect in the owning Cell.
    evidence:
      - docs/graph/catalog/cells.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - scan for subprocess, requests, socket, file write, db client usage
      - compare against `effects_allowed`
      - run docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --baseline tests/architecture/allowlists/catalog_governance_gate.baseline.json

  - id: context_pack_is_primary_ai_entry
    severity: high
    description: >
      AI-facing work should start from catalog metadata and context packs rather
      than full-repository scanning.
    evidence:
      - docs/ARCHITECTURE_SPEC.md
      - docs/templates/context.pack.json
    current_status: enforced_non_regressive
    # Migrated 2026-04-24: 42/56 public cells have generated descriptor packs.
    # Missing packs baseline established for 14 cells; gate tracks coverage trend.
    desired_automation:
      - ensure each public Cell has a generated context pack
      - ensure context pack freshness timestamp is tracked

  - id: semantic_descriptor_schema_valid
    severity: blocker
    description: >
      context.catalog 生成的语义描述卡缓存必须满足 semantic descriptor schema，
      并且结构字段完整可被机器消费。
    evidence:
      - docs/governance/schemas/semantic-descriptor.schema.yaml
      - workspace/meta/context_catalog/descriptors.json
    current_status: enforced_non_regressive
    desired_automation:
      - run docs/scripts/check_context_catalog_descriptor_cache.py
      - validate descriptors.json against semantic-descriptor.schema.yaml

  - id: semantic_descriptor_freshness
    severity: blocker
    description: >
      若 Cell 资产发生变化，context.catalog 描述卡缓存必须被刷新，禁止使用过期索引。
    evidence:
      - polaris/cells/context/catalog/role_agent_service.py
      - workspace/meta/context_catalog/index_state.json
    current_status: enforced_non_regressive
    desired_automation:
      - compute source hash drift from graph/cell assets
      - fail when check-freshness reports stale=true

  - id: graph_constrained_semantic_retrieval
    severity: high
    description: >
      语义检索必须先通过 Graph 约束过滤，再进行向量排序，避免向量结果覆盖架构边界事实。
    evidence:
      - docs/ACGA_2.0_PRINCIPLES.md
      - cells/context/engine/providers.py
      - polaris/cells/context/catalog/role_agent_service.py
    current_status: enforced_non_regressive
    # Migrated 2026-04-24: roles.kernel context_event imports from
    # cells.context.engine which applies graph filter before semantic rank.
    # Catalog governance gate validates subgraph constraint compliance.
    desired_automation:
      - assert retrieval pipeline applies graph filter before semantic rank
      - fail if retrieval path bypasses catalog/subgraph constraints

  - id: contract_change_requires_review
    severity: high
    description: >
      Any change to public contracts should trigger compatibility review and
      targeted downstream regression selection.
    evidence:
      - docs/graph/catalog/cells.yaml
    current_status: enforced_non_regressive
    # Migrated 2026-04-24: catalog governance gate detects contract module
    # changes and reports affected Cells with downstream regression targets.
    desired_automation:
      - detect changes under contract modules
      - diff affected Cells via catalog
      - select tests by subgraph and dependent Cells

  - id: critical_subgraph_has_verify_targets
    severity: high
    description: >
      Every critical subgraph must name concrete test targets and critical
      contracts for regression.
    evidence:
      - docs/graph/subgraphs/director_pipeline.yaml
      - docs/graph/subgraphs/pm_pipeline.yaml
      - docs/graph/subgraphs/context_plane.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - validate non-empty `verify_targets`
      - confirm referenced files exist
      - run docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --baseline tests/architecture/allowlists/catalog_governance_gate.baseline.json

  - id: migration_gaps_are_explicit
    severity: medium
    description: >
      During migration, every Cell must explicitly record unresolved gaps instead
      of pretending the architecture is already complete.
    evidence:
      - docs/graph/catalog/cells.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - require `verification.gaps`
      - fail if omitted on mapped legacy Cells

  - id: migration_units_do_not_conflict
    severity: blocker
    description: >
      Active migration units must not claim the same legacy path as `coverage:
      full`, and target paths must not overlap unless the overlap is explicitly
      marked as partial and justified.
    evidence:
      - docs/migration/ledger.yaml
    current_status: draft
    desired_automation:
      - detect duplicate `source_refs` with `coverage: full`
      - detect overlapping `target.target_paths`
      - require partial-overlap justification notes

  - id: catalog_missing_units_cannot_advance
    severity: high
    description: >
      A migration unit whose target Cell is missing from the catalog may be
      planned, in_progress, or blocked while graph work catches up, but it may
      not advance as if the graph truth already existed.
    evidence:
      - docs/migration/ledger.yaml
      - docs/graph/catalog/cells.yaml
    current_status: draft
    desired_automation:
      - fail if `target.catalog_status = missing` and `status` is `code_moved` or beyond
      - require matching catalog entry before `code_moved`

  - id: shim_only_units_require_markers
    severity: high
    description: >
      Once a migration unit reaches `imports_switched` or `shim_only`, legacy
      files must carry explicit migration headers so later AI/Agent work does not
      extend deprecated code paths.
    evidence:
      - docs/migration/tui_runtime.md
      - docs/migration/ledger.yaml
    current_status: draft
    desired_automation:
      - detect units at `imports_switched` or `shim_only`
      - require MIGRATION-STATUS and MIGRATION-UNIT markers in legacy files
      - run docs/migration/scripts/legacy_header_audit.py

  - id: legacy_file_coverage_audit
    severity: blocker
    description: >
      Legacy coverage must be audited at file granularity so directory-level
      catch-all claims do not hide orphaned or partially ported code.
    evidence:
      - docs/migration/legacy_coverage_report.json
      - docs/migration/legacy_coverage_report.md
      - docs/migration/ledger.yaml
    current_status: draft
    desired_automation:
      - run docs/migration/scripts/legacy_coverage_audit.py
      - fail if `unclaimed > 0`
      - fail if `ported_untracked > 0`
      - report `directory_only_claimed` count trend and top offenders

  - id: verified_or_retired_units_require_evidence
    severity: high
    description: >
      No migration unit may be marked `verified` or `retired` without matching
      graph updates, documentation updates, and at least one recorded validation
      target or check.
    evidence:
      - docs/migration/ledger.yaml
      - docs/MIGRATION_LEDGER.md
    current_status: draft
    desired_automation:
      - require non-empty verification data for `verified` and `retired` units
      - require referenced graph/doc paths to exist

  - id: migration_preflight_required
    severity: blocker
    description: >
      Formal migration writes must run through the preflight suite first. This
      prevents direct execution of write scripts without fixture experiment,
      UTF-8 checks, and consistency guards.
    evidence:
      - docs/migration/scripts/migration_preflight_suite.py
      - docs/migration/preflight/preflight_report.json
      - docs/migration/preflight/preflight_report.md
    current_status: enforced_non_regressive
    desired_automation:
      - run docs/migration/scripts/migration_preflight_suite.py
      - fail if preflight return code is non-zero
      - require generated preflight report artifacts

  - id: kernelone_release_collect_clean
    severity: blocker
    description: >
      KernelOne release gate suite must be collectable without import errors.
      This isolates kernelone baseline quality from unrelated migration churn.
    evidence:
      - docs/governance/ci/scripts/run_kernelone_release_gate.py
      - tests/architecture/test_kernelone_release_gates.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python docs/governance/ci/scripts/run_kernelone_release_gate.py --mode collect
      - fail if collect stage returns non-zero

  - id: kernelone_import_fence_clean
    severity: blocker
    description: >
      KernelOne must not import delivery/application/domain/infrastructure/cells.
      Reverse-layer imports break the Agent-OS boundary and testability.
    evidence:
      - tests/architecture/test_kernelone_release_gates.py
      - tests/architecture/test_kernelone_boundary_clean_subsystems.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_kernelone_release_gates.py::test_kernelone_import_fence_blocks_reverse_layer_imports
      - fail on any reverse-layer import finding

  - id: kernelone_exception_budget_non_regressive
    severity: high
    description: >
      `except Exception` and bare `pass` are allowed only under strict
      non-regressive budgets until full typed error convergence is completed.
    evidence:
      - tests/architecture/allowlists/kernelone_exception_budget.json
      - tests/architecture/test_kernelone_release_gates.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_kernelone_release_gates.py::test_kernelone_exception_budget_is_non_regressive
      - fail when totals or hotspot budgets regress

  - id: kernelone_release_suite_green
    severity: blocker
    description: >
      KernelOne release suite must execute green after collect passes.
      Collect-only alone does not prove behavior-level reliability.
    evidence:
      - docs/governance/ci/scripts/run_kernelone_release_gate.py
      - tests/test_kernelone_*.py
      - tests/architecture/test_kernelone_*.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python docs/governance/ci/scripts/run_kernelone_release_gate.py --mode tests
      - fail if any suite test fails

  - id: agent_instruction_snapshot_consistent
    severity: high
    description: >
      AGENTS.md / CLAUDE.md / GEMINI.md must expose the same architecture
      snapshot facts to avoid prompt-truth split for multi-agent execution.
    evidence:
      - AGENTS.md
      - CLAUDE.md
      - GEMINI.md
      - tests/architecture/test_kernelone_release_gates.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_kernelone_release_gates.py::test_agent_instruction_snapshot_is_consistent
      - fail on any snapshot field mismatch

  - id: manifest_catalog_consistency
    severity: blocker
    description: >
      Cell manifests and catalog must not drift. Specifically: catalog depends_on
      must be a superset of manifest depends_on; catalog owned_paths must contain
      all manifest owned_paths; catalog state_owners must be a superset of manifest
      state_owners; catalog effects_allowed must be a superset of manifest
      effects_allowed. Existing mismatches are frozen via JSON Lines baseline and
      do not cause gate failure. New mismatches are blocked in fail-on-new mode.
    evidence:
      - docs/governance/ci/scripts/run_catalog_governance_gate.py
      - docs/graph/catalog/cells.yaml
      - polaris/cells/*/*/cell.yaml
    current_status: enforced_non_regressive
    desired_automation:
      - run python docs/governance/ci/scripts/run_catalog_governance_gate.py --workspace . --mode fail-on-new --mismatch-baseline tests/architecture/allowlists/manifest_catalog_mismatches.baseline.jsonl
      - fail if new mismatches introduced
      - write: --write-mismatch-baseline tests/architecture/allowlists/manifest_catalog_mismatches.baseline.jsonl
  - id: delivery_cli_import_hygiene
    severity: high
    description: >
      Delivery CLI entrypoints must keep import hygiene: no legacy scripts/core
      path injection and no heavy runtime-config side effects at import time.
      This keeps bootstrap deterministic and prevents hidden path-coupling debt.
    evidence:
      - tests/architecture/test_delivery_cli_import_hygiene.py
      - polaris/delivery/cli/pm/config.py
      - polaris/delivery/cli/pm/cli.py
      - polaris/delivery/cli/director/cli_thin.py
      - polaris/delivery/http/adapters/scripts_pm.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_delivery_cli_import_hygiene.py
      - fail on any regression in conditional bootstrap or import-time side-effect guards

  - id: debt_register_schema_valid
    severity: blocker
    description: >
      Governance debt must live in a machine-readable debt register with stable
      ids, explicit residual risks, and linked evidence.
    evidence:
      - docs/governance/debt.register.yaml
      - docs/governance/schemas/debt-register.schema.yaml
      - tests/architecture/test_structural_bug_governance_assets.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_structural_bug_governance_assets.py::test_debt_register_shape_and_links
      - fail if any required debt field, linked asset, or debt id convention drifts

  - id: verify_pack_schema_valid
    severity: blocker
    description: >
      Cell verify packs must expose concrete regression targets, linked
      governance artifacts, and open debt ids in a machine-readable format.
    evidence:
      - docs/governance/schemas/verify-pack.schema.yaml
      - polaris/cells/roles/kernel/generated/verify.pack.json
      - tests/architecture/test_structural_bug_governance_assets.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_structural_bug_governance_assets.py::test_roles_kernel_verify_pack_shape_and_links
      - fail if verify pack paths or debt links drift

  - id: structural_bug_governance_assets_complete
    severity: high
    description: >
      Structural bug fixes that touch runtime contracts must ship a verification
      card, ADR, debt entry, verify pack update, and regression tests.
    evidence:
      - docs/governance/STRUCTURAL_BUG_PROTOCOL.md
      - docs/governance/decisions/adr-0043-structural-bug-governance-loop.md
      - docs/governance/templates/verification-cards/vc-20260325-turn-engine-tool-loop.yaml
      - tests/architecture/test_structural_bug_governance_assets.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_structural_bug_governance_assets.py::test_structural_bug_governance_chain_is_complete
      - fail if linked governance assets are missing or inconsistent

  - id: kernelone_llm_contract_reexport_parity
    severity: blocker
    description: >
      Shared llm contracts re-exported through engine contracts must stay in
      parity, and executor must import the required stream contract symbols.
    evidence:
      - polaris/kernelone/llm/shared_contracts.py
      - polaris/kernelone/llm/engine/contracts.py
      - polaris/kernelone/llm/engine/executor.py
      - tests/architecture/test_kernelone_llm_contract_reexports.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q tests/architecture/test_kernelone_llm_contract_reexports.py
      - fail on StreamEventType parity drift or missing executor imports

  - id: roles_kernel_turn_stage_boundaries_non_regressive
    severity: blocker
    description: >
      roles.kernel turn engine must preserve explicit raw/sanitized/native stage
      boundaries so tool-call parsing never consumes sanitized content and
      transcript persistence never stores wrapper-bearing content.
    evidence:
      - polaris/cells/roles/kernel/internal/turn_engine.py
      - polaris/cells/roles/kernel/tests/test_turn_engine_semantic_stages.py
      - polaris/cells/roles/kernel/generated/verify.pack.json
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q polaris/cells/roles/kernel/tests/test_turn_engine_semantic_stages.py
      - fail if raw_content or clean_content responsibilities drift

  - id: tool_calling_canonical_identity_non_regressive
    severity: blocker
    description: >
      Tool-calling benchmark must preserve raw canonical tool identity.
      Gate must detect and fail when raw stream tool names differ from observed
      tool names due to alias mapping or normalization drift.
    evidence:
      - docs/governance/AGENTIC_TOOL_CALLING_MATRIX_V2_STANDARD.md
      - docs/governance/ci/scripts/run_tool_calling_canonical_gate.py
      - tests/architecture/test_tool_calling_canonical_gate.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m polaris.delivery.cli agentic-eval --workspace . --suite tool_calling_matrix --role director --matrix-transport both --provider-id runtime_binding --model runtime_binding --format json
      - run python docs/governance/ci/scripts/run_tool_calling_canonical_gate.py --workspace . --role director --mode hard-fail --report workspace/meta/governance_reports/tool_calling_canonical_gate.json
      - fail on any alias_tool_name_used/raw_observed_name_drift issue

  - id: contextos_governance
    severity: blocker
    description: >
      ContextOS governance gate validates ProviderFormatter Protocol existence,
      EpisodeCard dataclass implementation, and SSOT constraint test coverage.
      This ensures the State-First Context OS architecture is properly implemented
      and all components are in place before promotion.
    evidence:
      - polaris/cells/roles/kernel/internal/llm_caller.py  # ProviderFormatter Protocol
      - polaris/kernelone/context/context_os/models.py  # EpisodeCard
      - polaris/tests/contextos/test_context_os_ssot_constraint.py  # SSOT constraint tests
    current_status: enforced_non_regressive
    desired_automation:
      - run python docs/governance/ci/scripts/run_contextos_governance_gate.py --workspace .
      - fail if ProviderFormatter Protocol is missing or incomplete
      - fail if EpisodeCard is missing required fields
      - fail if SSOT constraint tests do not pass

  # ---------------------------------------------------------------------------
  # Phase 5: Canonical Code Exploration Rules (2026-03-25)
  # ADR: docs/governance/decisions/adr-0042-canonical-code-exploration.md
  # ---------------------------------------------------------------------------

  - id: CE-001
    severity: blocker
    description: >
      read_file must not be the first tool call in an exploration turn for files
      >100 lines.  MAP phase (repo_map) must precede SEARCH and SLICE phases.
      Enforced by WorkingSetAssembler phase tracking and E2E test.
    evidence:
      - polaris/kernelone/context/exploration_policy.py
      - polaris/kernelone/context/working_set.py
      - polaris/kernelone/context/tests/test_context_subsystem.py
      - polaris/cells/roles/kernel/tests/test_canonical_exploration_e2e.py
    current_status: enforced
    # Migrated 2026-04-24: E2E test exists and passes; automation command is stable.
    desired_automation:
      - run python -m pytest -q polaris/cells/roles/kernel/tests/test_canonical_exploration_e2e.py::TestCanonicalCodeExploration::test_repo_map_before_full_read
      - fail if MAP phase is not set before SLICE phase in tool call sequence

  - id: CE-002
    severity: blocker
    description: >
      Full-file read on files >2000 lines must require an explicit upgrade flag.
      The canonical tool surface (repo_read_slice/around/head/tail) must be used
      instead.  runtime_executor enforcement + E2E test verify this.
    evidence:
      - polaris/kernelone/context/exploration_policy.py
      - polaris/kernelone/context/working_set.py
      - polaris/kernelone/context/engine/utils.py  # _read_slice_spec
      - polaris/cells/roles/kernel/tests/test_canonical_exploration_e2e.py
    current_status: enforced
    # Migrated 2026-04-24: E2E test exists and passes; slice enforcement is stable in runtime.
    desired_automation:
      - run python -m pytest -q polaris/cells/roles/kernel/tests/test_canonical_exploration_e2e.py::TestCanonicalCodeExploration::test_large_file_uses_slice
      - audit runtime_executor for read_file call patterns above 2000-line threshold

  - id: CE-003
    severity: warning
    description: >
      Context compaction must not trigger before 80% window utilization.
      Budget gate fires proactively at 80% threshold (compaction_trigger_ratio=0.80).
      Premature compaction would discard useful context unnecessarily.
    evidence:
      - polaris/kernelone/context/budget_gate.py
      - polaris/kernelone/context/exploration_policy.py  # should_compact
      - polaris/kernelone/context/tests/test_context_subsystem.py
      - polaris/cells/roles/kernel/tests/test_canonical_exploration_e2e.py
    current_status: enforced_non_regressive
    desired_automation:
      - run python -m pytest -q polaris/kernelone/context/tests/test_context_subsystem.py::TestExplorationPolicy::test_should_compact_at_80_percent
      - run python -m pytest -q polaris/kernelone/context/tests/test_context_subsystem.py::TestBudgetGate
      - fail if compaction fires below 80% threshold

  - id: CE-004
    severity: high
    description: >
      Working-set assembler must track expansion history (seen_assets, denied_count,
