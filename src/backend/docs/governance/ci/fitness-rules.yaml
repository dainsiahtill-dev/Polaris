      Outbox record written as pending; relay_outbox_messages handles delivery
      to fact_stream. State+outbox write atomicity implemented via
      save_items_and_outbox_atomic (SQLite BEGIN IMMEDIATE transaction).
      Mainline service methods (publish, claim, acknowledge, fail, requeue,
