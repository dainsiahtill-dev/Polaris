      - "Extend transcript/write-path audits to host adapters that persist assistant chunks"

  - id: "DEBT-20260325-kernelone-llm-reexport-parity"
    title: "KernelOne llm shared contract re-export chain can drift"
    classification: structural
    status: monitoring
    severity: high
    scope_refs:
      - "polaris/kernelone/llm/shared_contracts.py"
      - "polaris/kernelone/llm/engine/contracts.py"
      - "polaris/kernelone/llm/engine/executor.py"
    summary: >
      StreamEventType lives in shared_contracts and is re-exported through engine
      contracts before executor imports it. The architectural risk is reduced by
      parity tests, but the re-export layer still requires disciplined maintenance.
    root_cause: >
      Consumers relied on a manual re-export chain without an automated parity gate.
      One missing import in executor.py was enough to crash the runtime at import time.
    trigger_conditions:
      - "Editing StreamEventType or other shared llm contracts"
      - "Editing engine/contracts.py re-exports"
      - "Editing executor.py contract imports or stream event handling"
    mitigations:
      - "Architecture tests now assert StreamEventType identity across source and re-export"
      - "Architecture tests parse executor.py to require importing StreamEventType from contracts"
    residual_risks:
      - "The re-export layer still exists, so parity remains a governance concern"
      - "Future shared contract additions can drift if parity tests are not extended"
    linked_assets:
      adrs:
        - "docs/governance/decisions/adr-0042-turn-engine-triple-responsibility.md"
        - "docs/governance/decisions/adr-0043-structural-bug-governance-loop.md"
      verification_cards:
        - "docs/governance/templates/verification-cards/vc-20260325-turn-engine-tool-loop.yaml"
      verify_packs:
        - "polaris/cells/roles/kernel/generated/verify.pack.json"
      tests:
        - "tests/architecture/test_kernelone_llm_contract_reexports.py"
    next_actions:
      - "Prefer canonical source imports for new consumers where re-export is not required"
      - "Extend parity coverage when additional shared contracts are added to the engine surface"
