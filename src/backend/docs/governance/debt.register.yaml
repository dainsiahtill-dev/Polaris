  - id: "DEBT-20260325-roles-kernel-turn-stage-contract"
    title: "roles.kernel turn semantic stages remain runtime-enforced"
    classification: structural
    status: active
    severity: high
    scope_refs:
      - "roles.kernel"
      - "polaris/cells/roles/kernel/internal/turn_engine.py"
    summary: >
      roles.kernel now separates raw_content, clean_content, and native_tool_calls
      through AssistantTurnArtifacts, but the parser/transcript contract is still
      enforced by runtime conventions rather than compile-time types.
    root_cause: >
      The original turn engine passed ambiguous strings between parsing, UI output,
      and transcript persistence. That allowed [TOOL_CALL] wrappers to leak into
      session history and broke fallback parsing when sanitized text was reused.
    trigger_conditions:
      - "Changing turn_engine run() or run_stream() content handling"
      - "Changing transcript append behavior or sanitizer logic"
      - "Changing tool-call parsing fallbacks when native_tool_calls are absent"
    mitigations:
      - "AssistantTurnArtifacts makes raw/sanitized/native data explicit"
      - "Semantic stage regression tests protect parser and transcript boundaries"
      - "verify.pack.json records current guarantees and residual risks"
    residual_risks:
      - "The parser still accepts raw_content as plain str instead of a dedicated typed wrapper"
      - "Downstream stream consumers can still regress if they reintroduce wrapper-bearing chunk contracts"
