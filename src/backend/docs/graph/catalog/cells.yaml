version: 1
catalog_id: polaris-phase1-public-cells
description: >
  Phase-1 public cell catalog for boundary convergence. These entries declare
  target capability ownership and migration gaps; they do not claim full
  implementation completion unless explicitly verified.
owners:
  - architecture-team
  - backend-engine
migration_status: phase1_public_phase2_composite_phase3_business_cells_declared
cells:
  - id: context.catalog
    title: Context Catalog
    kind: capability
    visibility: public
    stateful: true
    owner: context
    purpose: >
      Builds deterministic descriptor cards from graph assets and serves
      graph-backed lookup for AI context assembly.
    current_modules:
      - polaris.cells.context.catalog.service
      - polaris.cells.context.catalog.internal.evolution_engine
    owned_paths:
      - polaris/cells/context/catalog/**
    public_contracts:
      modules:
        - polaris.cells.context.catalog.public.contracts
      commands: []
      queries:
        - SearchCellsQueryV1
      events: []
      results:
        - SearchCellsResultV1
        - CellDescriptorV1
      errors: []
    depends_on:
      - roles.runtime
    subgraphs: []
    state_owners:
      - workspace/meta/context_catalog/*
    effects_allowed:
      - fs.read:docs/graph/**
      - fs.write:workspace/meta/context_catalog/*
    verification:
      tests:
        - polaris/cells/context/catalog/tests/test_service.py
        - polaris/cells/context/catalog/tests/test_descriptor_validation.py
        - polaris/cells/context/catalog/tests/test_descriptor_cache_script.py
      smoke_commands:
        - python -m polaris.cells.context.catalog sync --workspace .
        - python docs/scripts/check_context_catalog_descriptor_cache.py --workspace .
      gaps:
        - No public `storage.layout` cell is reintroduced yet.
        - Vector rank and rerank are not wired yet.

  - id: delivery.api_gateway
    title: API Gateway
    kind: capability
    visibility: public
    stateful: false
    owner: delivery
    purpose: >
      Own inbound HTTP and WebSocket protocol translation and route dispatch.
      This cell must not become a runtime state owner.
    current_modules:
      - polaris.delivery.http.app_factory
      - polaris.delivery.http.routers
      - polaris.delivery.ws.runtime_endpoint
    owned_paths:
      - polaris/delivery/http/app_factory.py
      - polaris/delivery/http/dependencies.py
      - polaris/delivery/http/error_handlers.py
      - polaris/delivery/http/middleware/**
      - polaris/delivery/http/routers/__init__.py
      - polaris/delivery/http/routers/_shared.py
      - polaris/delivery/http/routers/sse_utils.py
      - polaris/delivery/http/v2/__init__.py
    public_contracts:
      modules:
        - polaris.cells.delivery.api_gateway.public.contracts
      commands:
        - ApiCommandV1
      queries:
        - ApiQueryV1
      events:
        - ApiResponseEventV1
      results:
        - ApiResponseV1
      errors:
        - ApiGatewayErrorV1
    depends_on:
      - runtime.projection
      - policy.workspace_guard
    subgraphs:
      - storage_archive_pipeline
    state_owners: []
    effects_allowed:
      - http.inbound:*
      - ws.inbound:*
      - fs.read:runtime/*
      - fs.read:workspace/history/*
    verification:
      tests:
        - tests/architecture/test_polaris_layout.py
      gaps:
        - Router-to-cell alignment is still being decomposed.

  - id: delivery.cli
    title: CLI Delivery
    kind: capability
    visibility: public
    stateful: false
    owner: delivery
    purpose: >
      Canonical delivery entry for CLI command execution. Provides the ExecuteCliCommandV1
      contract and CliExecutionService that dispatches MANAGEMENT commands (status, init,
      requirement_*, task_*) directly and routes ROLE_EXECUTION commands (architect.analyze,
      director.run) through RoleRuntimeService facade. This cell does NOT own the host-layer
      entry points under polaris/delivery/cli/.
    owned_paths:
      - polaris/cells/delivery/cli/**/*.py
    public_contracts:
      modules:
        - polaris.cells.delivery.cli.public.contracts
      commands:
        - ExecuteCliCommandV1
      queries:
        - QueryCliStatusV1
      events:
        - CliCommandStartedEventV1
        - CliCommandCompletedEventV1
      results:
        - CommandResultV1
      errors:
        - CommandErrorV1
        - WorkspaceNotFoundError
        - CommandNotFoundError
        - CommandTimeoutError
        - WorkspaceNotInitializedError
    depends_on:
      - roles.runtime
    subgraphs: []
    state_owners: []
    effects_allowed:
      - fs.read:workspace/*
      - fs.write:workspace/.polaris/*
      - role.execute:*
    verification:
      gaps:
        - Management handler registry is not yet wired to actual pm_cli.py / cli_thin.py.
        - DAEMON mode execution is a placeholder.

  - id: policy.workspace_guard
    title: Workspace Guard
    kind: policy
    visibility: public
    stateful: true
    owner: policy
    purpose: >
      Enforce workspace path legality, scope constraints, and write-guard checks
      for runtime and history operations.
    current_modules:
      - polaris.cells.policy.workspace_guard.service
    owned_paths:
      - polaris/cells/policy/workspace_guard/service.py
    public_contracts:
      modules:
        - polaris.cells.policy.workspace_guard.public.contracts
      commands: []
      queries:
        - WorkspaceWriteGuardQueryV1
        - WorkspaceArchiveWriteGuardQueryV1
      events:
        - WorkspaceGuardViolationEventV1
      results:
        - WorkspaceGuardDecisionV1
      errors:
        - WorkspaceGuardErrorV1
    depends_on:
      - policy.permission
      - storage.layout
      - audit.evidence
    subgraphs:
      - storage_archive_pipeline
    state_owners:
      - workspace/policy/*
    effects_allowed:
      - fs.read:workspace/**
      - fs.read:runtime/**
    verification:
      tests:
        - tests/architecture/test_polaris_kernel_fs_guard.py
      gaps:
        - Guard checks still exist in scattered call sites and need full convergence.
        - Permission matrix logic has been split to policy.permission and is still being rewired.

  - id: workspace.integrity
    title: Workspace Integrity
    kind: capability
    visibility: public
    stateful: true
    owner: workspace
    purpose: >
      Provide workspace validation, docs bootstrap safety checks, code parser
      access, and file-change tracking primitives for orchestration and
      delivery flows.
    current_modules:
      - polaris.cells.workspace.integrity.public.service
      - polaris.cells.workspace.integrity.internal.workspace_service
      - polaris.cells.workspace.integrity.internal.fs_utils
      - polaris.cells.workspace.integrity.internal.code_parser
      - polaris.cells.workspace.integrity.internal.code_intel
      - polaris.cells.workspace.integrity.internal.diff_tracker
    owned_paths:
      - polaris/cells/workspace/integrity/**
    public_contracts:
      modules:
        - polaris.cells.workspace.integrity.public.contracts
      commands:
        - ValidateWorkspaceCommandV1
        - EnsureDocsReadyCommandV1
        - GenerateDocsTemplatesCommandV1
      queries: []
      events: []
      results:
        - DocsTemplatesResultV1
      errors:
        - WorkspaceIntegrityErrorV1
    depends_on:
      - policy.workspace_guard
      - runtime.execution_broker
      - runtime.projection
      - storage.layout
    subgraphs:
      - execution_governance_pipeline
    state_owners:
      - workspace/meta/workspace_status.json
    effects_allowed:
      - fs.read:workspace/**
      - fs.write:workspace/meta/workspace_status.json
      - fs.write:workspace/docs/**
      - process.spawn:workspace/indexer
    verification:
      tests:
        - tests/test_docs_template_quality.py
        - tests/test_workspace_policy_guard.py
        - tests/test_hyper_opt.py
      gaps:
        - Code intelligence indexing strategy still depends on infrastructure adapter maturity.

  - id: runtime.state_owner
    title: Runtime State Owner
    kind: capability
    visibility: public
    stateful: true
    owner: runtime
    purpose: >
      Own runtime source-of-truth writes for contracts, runs, and runtime state
      snapshots with explicit single-writer guarantees.
    current_modules:
      - polaris.cells.runtime.state_owner.internal.state
      - polaris.cells.runtime.state_owner.internal.pm_contract_store
      - polaris.cells.runtime.state_owner.internal.maintenance
      - polaris.cells.runtime.state_owner.internal.runtime_state_registry
    owned_paths:
      - polaris/cells/runtime/state_owner/internal/**
    public_contracts:
      modules:
        - polaris.cells.runtime.state_owner.public.contracts
      commands:
        - PersistRuntimeTaskStateCommandV1
        - PersistRuntimeContractCommandV1
        - PersistRuntimeRunCommandV1
      queries:
        - GetRuntimeSnapshotQueryV1
        - GetRuntimeRunQueryV1
      events:
        - RuntimeStateChangedEventV1
      results:
        - RuntimeStateWriteResultV1
      errors:
        - RuntimeStateOwnerErrorV1
    depends_on:
      - policy.workspace_guard
      - audit.evidence
      - docs.court_workflow
    subgraphs:
      - storage_archive_pipeline
    state_owners:
      - runtime/contracts/*
      - runtime/state/*
      - runtime/runs/*
    effects_allowed:
      - fs.read:runtime/*
      - fs.write:runtime/contracts/*
      - fs.write:runtime/state/*
      - fs.write:runtime/runs/*
    verification:
      tests:
        - tests/architecture/test_architecture_invariants.py
      gaps:
        - Runtime task lifecycle ownership has moved to runtime.task_runtime and still needs broader call-site convergence.

  - id: runtime.task_runtime
    title: Runtime Task Runtime
    kind: workflow
    visibility: public
    stateful: true
    owner: runtime
    purpose: >
      Provide the single task lifecycle runtime for PM/Director/QA collaboration,
      including create/claim/update/reopen transitions and canonical taskboard rows.
    current_modules:
      - polaris.cells.runtime.task_runtime.public.service
      - polaris.cells.runtime.task_runtime.internal.service
      - polaris.kernelone.task_graph.task_board
    owned_paths:
      - polaris/cells/runtime/task_runtime/**
    public_contracts:
      modules:
        - polaris.cells.runtime.task_runtime.public.contracts
      commands:
        - CreateRuntimeTaskCommandV1
        - UpdateRuntimeTaskCommandV1
        - ReopenRuntimeTaskCommandV1
      queries:
        - ListRuntimeTasksQueryV1
        - GetRuntimeTaskQueryV1
      events:
        - RuntimeTaskLifecycleEventV1
      results:
        - RuntimeTaskResultV1
      errors:
        - RuntimeTaskRuntimeErrorV1
    depends_on:
      - policy.workspace_guard
      - audit.evidence
      - events.fact_stream
    subgraphs:
      - execution_governance_pipeline
    state_owners:
      - runtime/tasks/*
      - runtime/tasks/sessions/*
    effects_allowed:
      - fs.read:runtime/tasks/*
      - fs.write:runtime/tasks/*
      - fs.write:runtime/events/taskboard.terminal.events.jsonl
      - fs.read:runtime/tasks/sessions/*
      - fs.write:runtime/tasks/sessions/*
      - fs.write:runtime/events/task_runtime.execution.jsonl
      - ws.outbound:runtime/*
    verification:
      tests:
        - polaris/cells/runtime/task_runtime/tests/test_service.py
        - polaris/tests/test_runtime_projection_snapshot_tasks.py
      gaps:
        - Role-agent legacy entrypoints still need full migration to runtime.task_runtime contracts.

  - id: runtime.task_market
    title: Runtime Task Market
    kind: capability
    visibility: public
    stateful: true
    owner: runtime
    purpose: >
      Provide asynchronous task-market collaboration primitives for PM/ChiefEngineer/Director/QA,
      including publish/claim/lease/requeue/dead-letter lifecycle transitions.
    current_modules:
      - polaris.cells.runtime.task_market.public.service
      - polaris.cells.runtime.task_market.internal.service
    owned_paths:
      - polaris/cells/runtime/task_market/**
    public_contracts:
      modules:
        - polaris.cells.runtime.task_market.public.contracts
      commands:
        - PublishTaskWorkItemCommandV1
        - ClaimTaskWorkItemCommandV1
        - RenewTaskLeaseCommandV1
        - AcknowledgeTaskStageCommandV1
        - FailTaskStageCommandV1
        - RequeueTaskCommandV1
        - MoveTaskToDeadLetterCommandV1
      queries:
        - QueryTaskMarketStatusV1
      events:
        - TaskWorkItemPublishedEventV1
        - TaskLeaseGrantedEventV1
        - TaskStageAdvancedEventV1
        - TaskDeadLetteredEventV1
      results:
        - TaskWorkItemResultV1
        - TaskLeaseRenewResultV1
        - TaskMarketStatusResultV1
      errors:
        - TaskMarketErrorV1
    depends_on:
      - runtime.task_runtime
      - runtime.state_owner
      - runtime.projection
      - events.fact_stream
      - policy.workspace_guard
      - audit.evidence
    subgraphs:
      - execution_governance_pipeline
      - pm_pipeline
    state_owners:
      - runtime/task_market/*
    effects_allowed:
      - fs.read:runtime/task_market/*
      - fs.write:runtime/task_market/*
      - fs.write:runtime/events/*
      - ws.outbound:runtime/*
    verification:
      tests:
        - polaris/cells/runtime/task_market/tests/test_contracts.py
        - polaris/cells/runtime/task_market/tests/test_service.py
      gaps:
        - PM/ChiefEngineer/Director/QA mainline migration to task_market claim/ack is staged.
        - Outbox relay and durable Pull Consumer mainline are not fully wired yet.
        - WAITING_HUMAN and HITL authority remain partially sidecar-mediated.

  - id: runtime.execution_broker
    title: Runtime Execution Broker
    kind: capability
    visibility: public
    stateful: false
    owner: runtime
    purpose: >
      Provide unified process, async task, and blocking I/O execution submission
      for business cells through one cell-level facade backed by KernelOne
      execution runtime.
    current_modules:
      - polaris.cells.runtime.execution_broker.public.service
      - polaris.cells.runtime.execution_broker.internal.service
      - polaris.kernelone.runtime.execution_facade
    owned_paths:
      - polaris/cells/runtime/execution_broker/**
    public_contracts:
      modules:
        - polaris.cells.runtime.execution_broker.public.contracts
      commands:
        - LaunchExecutionProcessCommandV1
      queries:
        - GetExecutionProcessStatusQueryV1
      events: []
      results:
        - ExecutionProcessLaunchResultV1
        - ExecutionProcessWaitResultV1
      errors:
        - ExecutionBrokerErrorV1
    depends_on:
      - runtime.state_owner
      - policy.workspace_guard
      - audit.evidence
    subgraphs:
      - execution_governance_pipeline
    state_owners: []
    effects_allowed:
      - process.spawn:runtime/*
      - fs.write:runtime/logs/*
      - fs.write:runtime/events/*
      - ws.outbound:runtime/*
    verification:
      tests:
        - polaris/cells/runtime/execution_broker/tests/test_service.py
      gaps:
        - Legacy sync call sites are still converging to async-first broker contracts.

  - id: runtime.projection
    title: Runtime Projection
    kind: projection
    visibility: public
    stateful: false
    owner: runtime
    purpose: >
      Build read-only runtime status projections and transport payloads without
      introducing hidden writes on query paths.
    current_modules:
      - polaris.cells.runtime.projection.internal.runtime_projection_service
      - polaris.delivery.http.routers.runtime
    owned_paths:
      - polaris/cells/runtime/projection/internal/**
      - polaris/delivery/http/routers/runtime.py
      - polaris/delivery/ws/runtime_endpoint.py
      - polaris/delivery/ws/runtime_event_query.py
    public_contracts:
      modules:
        - polaris.cells.runtime.projection.public.contracts
      commands: []
      queries:
        - RuntimeProjectionQueryV1
      events:
        - RuntimeProjectedEventV1
        - RuntimeObserverEventV1
      results:
        - RuntimeProjectionResultV1
      errors:
        - RuntimeProjectionErrorV1
    depends_on:
      - runtime.task_runtime
      - runtime.state_owner
      - runtime.task_market
      - audit.evidence
      # Cross-cell read dependencies added 2026-03-22:
      # llm_status.py reads llm.evaluation (load_llm_test_index) and llm.provider_runtime
      # (is_role_runtime_supported) to build the LLM status section of the projection payload.
      - llm.evaluation
      - llm.provider_runtime
      # workspace_runtime_context.py reads storage.layout (load_persisted_settings) to resolve
      # the canonical workspace path before computing cache/runtime roots.
      - storage.layout
      # status_snapshot_builder.py and runtime_projection_service.py call
      # docs.court_workflow.public.service.map_engine_to_court_state to map engine+PM+Director
      # status into a court topology view included in the WebSocket status payload.
      # This is a stateless aggregation mapping - no business logic is owned by projection.
      - docs.court_workflow
      - director.execution
      - orchestration.pm_planning
      - orchestration.workflow_runtime
      - resident.autonomy
      - runtime.artifact_store
    subgraphs:
      - storage_archive_pipeline
    state_owners: []
    effects_allowed:
      - fs.read:runtime/*
      - fs.read:workspace/history/*
      - ws.outbound:runtime/*
    verification:
      tests:
        - tests/test_websocket_signal_hub.py
        - tests/test_runtime_projection_observability.py
      gaps:
        - "Projection read paths still include legacy compatibility joins."
        - >
          Added missing cross-cell dependencies: "llm.evaluation", "llm.provider_runtime",
          "storage.layout", "docs.court_workflow".


  - id: audit.evidence
    title: Evidence Audit
    kind: capability
    visibility: public
    stateful: true
    owner: audit
    purpose: >
      Own runtime evidence events, audit chain verification, and evidence query
      surfaces with append-only guarantees.
    current_modules:
      - polaris.cells.audit.evidence.task_service
      - polaris.kernelone.audit
      - polaris.infrastructure.audit
    owned_paths:
      - polaris/cells/audit/evidence/**
      - polaris/kernelone/audit/**
      - polaris/infrastructure/audit/**
      - polaris/delivery/http/audit_router.py
      - polaris/delivery/http/v2/audit.py
    public_contracts:
      modules:
        - polaris.cells.audit.evidence.public.contracts
      commands:
        - AppendEvidenceEventCommandV1
      queries:
        - QueryEvidenceEventsV1
        - VerifyEvidenceChainV1
      events:
        - EvidenceAppendedEventV1
      results:
        - EvidenceQueryResultV1
        - EvidenceVerificationResultV1
      errors:
        - EvidenceAuditErrorV1
    depends_on:
      - policy.workspace_guard
      - llm.provider_runtime
    subgraphs:
      - storage_archive_pipeline
    state_owners:
      - runtime/evidence/*
    effects_allowed:
      - fs.read:runtime/*
      - fs.write:runtime/evidence/*
      - process.exec:git
    verification:
      tests:
        - tests/test_log_pipeline_storage_layout.py
      gaps:
        - Runtime event stream ownership is moving to events.fact_stream.
        - Runtime event writers are not fully consolidated yet.

  - id: audit.diagnosis
    title: Audit Diagnosis
    kind: capability
    visibility: public
    stateful: true
    owner: audit
    purpose: >
      Provide deterministic diagnosis and trace-query capabilities for runtime
      audit failures, including websocket lifecycle audit writes.
    current_modules:
      - polaris.cells.audit.diagnosis.public.service
      - polaris.cells.audit.diagnosis.internal.diagnosis_engine
