      - fs.write:runtime/events/ws.connection.events.jsonl
      - fs.read:workspace/**
      - network.http_outbound:audit/*
      - process.exec:git
    verification:
      tests:
        - tests/test_audit_llm_runtime.py
        - tests/test_command_security.py
      gaps:
        - Audit toolkit command surface still carries legacy envelope compatibility payloads.
        - Event diagnosis query facades still need typed adapters for all consumers.

  - id: audit.verdict
    title: Audit Verdict
    kind: workflow
