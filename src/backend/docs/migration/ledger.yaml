# ACGA Migration Ledger
# Auto-generated skeleton — fill in per-wave execution data
version: 1
ledger_id: polaris-polaris-migration-2026-q1
description: >
  Migration of Polaris backend from legacy root directories (app/, core/, scripts/, api/)
  to ACGA 2.0 compliant polaris/ structure with Cell boundary enforcement.
  Tracks all migration units with schema-valid status, verification targets, and deletion gates.
authority_docs:
  - docs/FINAL_SPEC.md
  - docs/AGENT_ARCHITECTURE_STANDARD.md
  - docs/真正可执行的 ACGA 2.0 落地版.md
  - docs/governance/schemas/migration-ledger.schema.yaml
status_model:
  planned:
    meaning: Migration unit is scoped and documented but not yet started
  in_progress:
    meaning: Active development or refactoring underway
  code_moved:
    meaning: Source files physically relocated; imports not yet switched
  imports_switched:
    meaning: Import paths updated; old paths retained as thin shims
  shim_only:
    meaning: Old paths exist as zero-logic shims pointing to new root; ready for deletion review
  verified:
    meaning: Verification targets passed; graph and docs updated; ready for retirement
  retired:
    meaning: Old paths removed from disk; ledger entry archived
  blocked:
    meaning: Migration paused due to upstream dependency or graph gap
legacy_policies:
  POLARIS_rename_required:
    >
      All POLARIS_* environment variable references in polaris/ code must be
      renamed to KERNELONE_* before old-root retirement. POLARIS_* may be
      retained as a backward-compat alias in bootstrap config only, never in
      polaris/ business logic.
  no_new_shim:
    >
      Migration units reaching shim_only must not introduce new logic into old paths.
      Shim files are frozen stubs; all new development goes to the new root.
  utf8_mandatory:
    >
      All text file I/O introduced during migration must use explicit encoding="utf-8".
      This applies to both old-path shims and new-path implementations.

