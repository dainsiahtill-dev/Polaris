    status: verified
    current_impl_state: new_root_primary
    owner: architecture-engineer
    legacy_policy: no_new_shim
    depends_on: []
    blockers: []
    notes:
      - Completed 2026-03-20; bootstrap/ converged to polaris/bootstrap/
      - "polaris/bootstrap/ now the sole bootstrap root (13 Python files)"
    target:
      cell: bootstrap.assembly
      catalog_status: actual
      target_assets_status: active_impl
      root_dirs:
        - polaris/bootstrap/
      target_paths:
        - polaris/bootstrap/
      actual_impl_paths:
        - polaris/bootstrap/
      subgraphs: []
    source_refs:
      - path: src/backend/bootstrap/
        kind: directory
        coverage: full
        note: Entire legacy bootstrap/ directory replaced by polaris/bootstrap/
      - path: src/backend/app/bootstrap.py
        kind: file
        coverage: partial
        note: backend_utils.py and bootstrap entry consolidated
    verification:
      checks:
        - "pytest polaris/bootstrap/ -q"
        - "python -m polaris.bootstrap.bootstrap_test_suite"
      required_tests: []
      docs_updates:
        - docs/ARCHITECTURE_SPEC.md (bootstrap section)
        - docs/KERNELONE_ARCHITECTURE_SPEC.md
      graph_updates:
        - docs/graph/catalog/cells.yaml (bootstrap.assembly owned_paths updated)
