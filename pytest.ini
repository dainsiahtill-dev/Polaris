[pytest]
addopts = --import-mode=importlib
norecursedirs =
    tmp_pytest_agentic_eval_local
    .polaris
    .git
    .tox
    dist
    build
    *.egg-info
    tests/agent_stress
    tests/anthropomorphic
    tests/audit
    tests/llm_stress
    tests/refactor
    src/backend/tests/agent_stress
    src/backend/scripts
    src/backend/polaris/cells/llm/evaluation/fixtures/agentic_benchmark/workspaces/director_root_cause_locator/tests
    src/backend/polaris/cells/llm/evaluation/fixtures/agentic_benchmark/workspaces/director_safe_scope_plan/tests
markers =
    integration: integration/e2e style tests
    slow: long-running tests
