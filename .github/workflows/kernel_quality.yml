name: Kernel Quality Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          pip install -e .

      - name: Run Ruff Lint
        run: ruff check src/backend/polaris tests

      - name: Run Ruff Format Check
        run: ruff format --check src/backend/polaris tests scripts

      - name: Run MyPy
        run: mypy --strict src/backend/polaris

      - name: Run Tests with Coverage
        run: |
          pytest --cov=src/backend/polaris --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
